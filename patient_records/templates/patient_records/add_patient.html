{% extends 'patient_records/generic_form.html' %}

{% block title %}Add New Patient{% endblock %}

{% block content %}
<h1>Add New Patient</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Patient</button>
    <a href="{% url 'patient_list' %}">Cancel</a>
</form>
{% endblock %}
