<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Patient Management System{% endblock %}</title>
    <style>
        .messages {
            list-style: none;
            padding: 10px;
            margin: 10px 0;
        }
        .messages .success {
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
            color: #3c763d;
        }
        .messages .error {
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            color: #a94442;
        }
        nav {
            background-color: #f8f9fa;
            padding: 10px;
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }
        .content {
            padding: 20px;
        }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'patient_list' %}">Patients</a>
            <a href="{% url 'add_patient' %}">Add Patient</a>
            <a href="{% url 'provider_list' %}">Providers</a>
            <div class="user-nav">
                <span>Welcome, {{ user.username }}</span>
                <a href="{% url 'logout' %}">Logout</a>
            </div>
        </nav>
    {% endif %}

    <div class="content">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
