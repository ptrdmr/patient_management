{% extends 'patient_records/base_form.html' %}
{% load static %}

{% block extra_css %}
    {{ block.super }}
    <link rel="stylesheet" href="{% static 'css/autocomplete.css' %}">
{% endblock %}

{% block extra_js %}
    {{ block.super }}
    <script>
        // Debug logging
        console.log('Document loaded');
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM Content Loaded');
            const icdInputs = document.querySelectorAll('.icd-code-input');
            console.log('ICD inputs found:', icdInputs);
            const wrapper = document.querySelector('.icd-code-wrapper');
            console.log('Wrapper found:', wrapper);
            
            // Test the API endpoint directly
            fetch('/api/icd-lookup/?q=E11')
                .then(response => response.json())
                .then(data => console.log('API test response:', data))
                .catch(error => console.error('API test error:', error));
        });
    </script>
    <script src="{% static 'js/icd-autocomplete.js' %}"></script>
{% endblock %}
