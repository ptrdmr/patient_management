{% extends 'patient_records/base.html' %}
{% load static %}

{% block content %}
<div class="patient-header">
    <h1>{{ patient.full_name }}</h1>
    <p>DOB: {{ patient.date_of_birth|date:"M d, Y" }} | Gender: {{ patient.gender }}</p>
</div>

<div class="tab-container" data-patient-id="{{ patient.id }}">
    <div class="tab-nav">
        <a href="#" class="tab active" data-tab="overview">Overview</a>
        <a href="#" class="tab" data-tab="clinical">Clinical Data</a>
        <a href="#" class="tab" data-tab="medications">Medications</a>
        <a href="#" class="tab" data-tab="labs">Lab Results</a>
        <a href="#" class="tab" data-tab="history">History</a>
    </div>
    <div class="tab-content">
        <!-- Content will be loaded here -->
    </div>
</div>

{% block extra_css %}
<style>
    .tab-container { margin-top: 2rem; }
    .tab-nav {
        display: flex;
        border-bottom: 1px solid #dee2e6;
        margin-bottom: 1rem;
    }
    .tab {
        padding: 0.5rem 1rem;
        margin-right: 0.5rem;
        text-decoration: none;
        color: #495057;
        border: 1px solid transparent;
        cursor: pointer;
    }
    .tab:hover {
        border-color: #e9ecef #e9ecef #dee2e6;
    }
    .tab.active {
        color: #495057;
        background-color: #fff;
        border-color: #dee2e6 #dee2e6 #fff;
        margin-bottom: -1px;
        border-radius: 0.25rem 0.25rem 0 0;
    }
    .tab-content {
        padding: 1rem;
    }
    

    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
    }
</style>
{% endblock %}
{% endblock %}
